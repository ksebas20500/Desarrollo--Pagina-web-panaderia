# ========================
# Configuración del servidor
# ========================
server.port=8080

# ========================
# Firebase Admin SDK
# ========================
# Ruta al archivo de credenciales descargado de Firebase Console.
# En producción (Koyeb), esta variable se configura como variable de entorno.
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:src/main/resources/serviceAccountKey.json}
firebase.project.id=${FIREBASE_PROJECT_ID:desarrolo-panaderia-la-fabrica}