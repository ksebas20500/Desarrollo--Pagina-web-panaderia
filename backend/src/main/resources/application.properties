# ========================
# Configuración del servidor
# ========================
server.port=8080

# ========================
# Límite de tamaño de peticiones HTTP
# (necesario para enviar imágenes en Base64)
# ========================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-http-form-post-size=20MB
spring.mvc.pathmatch.use-suffix-pattern=false

# ========================
# Firebase Admin SDK
# ========================
# Ruta al archivo de credenciales descargado de Firebase Console.
# En producción (Render/Koyeb), esta variable se configura como variable de entorno.
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:src/main/resources/serviceAccountKey.json}
firebase.project.id=${FIREBASE_PROJECT_ID:desarrolo-panaderia-la-fabrica}