<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - La Fábrica</title>
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body class="dashboard-body">

    <div class="admin-layout">

        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="icon-circle-small">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z">
                        </path>
                        <line x1="6" y1="17" x2="18" y2="17"></line>
                    </svg>
                </div>
                <h3>La Fábrica</h3>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="9"></rect>
                        <rect x="14" y="3" width="7" height="5"></rect>
                        <rect x="14" y="12" width="7" height="9"></rect>
                        <rect x="3" y="16" width="7" height="5"></rect>
                    </svg>
                    Dashboard
                </a>
                <a href="productos.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                        </path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    Productos
                </a>
            </nav>

            <a href="login.html" class="logout-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Cerrar Sesión
            </a>
        </aside>

        <!-- === SECCIÓN PRINCIPAL DEL CONTENIDO === -->
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">Dashboard</h1>
                <a href="nuevo-producto.html" class="btn-primary" style="text-decoration: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Agregar Producto
                </a>
            </header>

            <!-- === GRID DE ESTADÍSTICAS === -->
            <!-- Aquí usamos IDs (ej. stat-total-productos) que luego Javascript va a encontrar y actualizar con los datos de Java -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-title">Total Productos</span>
                        <svg class="stat-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                    </div>
                    <div class="stat-value" id="stat-total-productos">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-title">Panes</span>
                        <svg class="stat-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m4.6 13.4-.5.4c-1.7 1.3-1.9 3.2-1.9 5.3 0 0 1.6-1.3 3.3-2.6 1.1-.8 1.4-2.2.7-3.1Z"></path>
                            <path d="m10.5 14.5-2.6-2.6c-2.4-2.4-2.5-5.9-.2-8.4l.2-.2c0 0 2.1 1.2 3.1 2.9.8 1.4 1 3.2 1 4.7 0 1.6.4 2.8 2.3 3.4l.3.1"></path>
                            <path d="m13.5 17.5 2.6 2.6c2.4 2.4 5.9 2.5 8.4.2l.2-.2c0 0-1.2-2.1-2.9-3.1-1.4-.8-3.2-1-4.7-1-1.6 0-2.8-.4-3.4-2.3l-.1-.3"></path>
                            <path d="m19.4 10.6.4-.5c1.3-1.7 3.2-1.9 5.3-1.9 0 0-1.3 1.6-2.6 3.3-.8 1.1-2.2 1.4-3.1.7Z"></path>
                        </svg>
                    </div>
                    <div class="stat-value" id="stat-panes">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-title">Tortas</span>
                        <svg class="stat-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2Z"></path>
                            <path d="M12 3v4"></path>
                            <path d="M8 4v3"></path>
                            <path d="M16 4v3"></path>
                            <path d="M2 13h20"></path>
                        </svg>
                    </div>
                    <div class="stat-value" id="stat-tortas">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-title">Postres</span>
                        <svg class="stat-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="8" width="18" height="4" rx="1"></rect>
                            <path d="M12 8v13"></path>
                            <path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"></path>
                            <path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"></path>
                        </svg>
                    </div>
                    <div class="stat-value" id="stat-postres">0</div>
                </div>
            </div>

            <!-- === SECCIÓN DE PRODUCTOS RECIENTES === -->
            <!-- Esta lista se llena dinámicamente llamando a http://localhost:8080/api/productos con Javascript -->
            <div class="dashboard-panel">
                <h3 class="panel-title">Productos Recientes</h3>

                <div class="empty-state" id="recent-empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="#A89D95" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                        </path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    <p>No hay productos todavía</p>
                    <a href="nuevo-producto.html" class="btn-outline" style="text-decoration:none;">Agregar primer producto</a>
                </div>

                <div id="recent-table-container" style="display: none; padding-top: 10px;">
                    <table class="admin-table">
                        <tbody id="recent-table-body">
                            <!-- JS inserta los productos recientes aquí -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script defer src="/__/firebase/10.8.0/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/10.8.0/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/init.js"></script>
    <script src="../../js/dashboard.js?v=2"></script>
</body>

</html>
