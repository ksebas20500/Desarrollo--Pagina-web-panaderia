<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | La Fábrica</title>

    <link rel="stylesheet" href="../css/styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    
    <style>
        /* Estilos adicionales específicos para esta página */
        .page-header {
            background-color: var(--bg-cream);
            padding: 80px 20px 40px;
            text-align: center;
        }
        
        .page-title {
            font-family: var(--font-serif);
            font-size: 50px;
            color: #2D241F;
            margin-bottom: 15px;
            text-transform: capitalize;
        }

        .category-breadcrumb {
            color: var(--primary-brown);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Modal para elegir sede por WhatsApp */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #665b55;
        }

        .modal-title {
            font-family: var(--font-serif);
            font-size: 24px;
            color: #2D241F;
            margin-bottom: 20px;
        }

        .modal-desc {
            color: #665b55;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .whatsapp-btn:hover {
            opacity: 0.9;
        }

        /* Para indicar si no hay productos */
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #665b55;
            font-size: 18px;
            grid-column: 1 / -1;
        }
        
        /* Ajuste de loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-brown);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            grid-column: 1 / -1;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="../imagen/logo.png" alt="Logo La Fábrica" class="logo-img">
                <span>La Fábrica</span>
            </a>

            <button class="mobile-menu-btn" id="open-menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <div class="nav-wrapper" id="mobile-nav">
                <div class="mobile-nav-header">
                    <span class="logo-text-mobile">La Fábrica</span>
                    <button class="close-menu-btn" id="close-menu">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <nav class="nav-links">
                    <a href="index.html">Inicio</a>
                    <a href="index.html#servicios">Servicios</a>
                    <a href="index.html#nosotros">Nosotros</a>
                    <a href="index.html#sedes">Sedes</a>
                    
                    <div class="dropdown-container desktop-menu-item">
                        <a href="index.html#productos" class="dropdown" style="color: var(--primary-brown); font-weight: 500;">Productos <span class="arrow">▼</span></a>
                        <div class="dropdown-menu">
                            <a href="productos.html?categoria=panes">Panes</a>
                            <a href="productos.html?categoria=tortas">Tortas</a>
                            <a href="productos.html?categoria=postres">Postres</a>
                        </div>
                    </div>
                </nav>

                <a href="index.html#sedes" class="btn-contact">Contáctanos</a>
            </div>
        </div>
    </header>

    <main>
        <div class="page-header">
            <p class="category-breadcrumb">NUESTRA SELECCIÓN DE</p>
            <h1 class="page-title" id="page-title">Cargando...</h1>
        </div>

        <section class="products-section" style="padding-top: 20px;">
            <div class="products-grid" id="products-grid-container">
                <div class="loader" id="loader"></div>
            </div>
        </section>
    </main>

    <!-- Modal WhatsApp -->
    <div class="modal-overlay" id="whatsapp-modal">
        <div class="modal-content">
            <button class="close-modal" id="close-modal">&times;</button>
            <h3 class="modal-title">¿Dónde deseas realizar tu pedido?</h3>
            <p class="modal-desc">Elige la sede más cercana a ti para enviarte tu pedido de <strong id="product-name-modal"></strong>.</p>
            
            <!-- Contenedor dinámico de los botones de sedes -->
            <div id="botones-sedes-container"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 La Fábrica. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBz1hgapvwapYHblYf3W2uvhdOoWVZxFLI",
            authDomain: "desarrolo-panaderia-la-fabrica.firebaseapp.com",
            projectId: "desarrolo-panaderia-la-fabrica",
            storageBucket: "desarrolo-panaderia-la-fabrica.firebasestorage.app",
            messagingSenderId: "444313347033",
            appId: "1:444313347033:web:7102e2a1b079326d442fc8"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
    <script src="../js/productos.js?v=3"></script>
    <script>
        // Lógica de Menú Móvil
        const openMenuBtn = document.getElementById('open-menu');
        const closeMenuBtn = document.getElementById('close-menu');
        const mobileNav = document.getElementById('mobile-nav');

        openMenuBtn.addEventListener('click', () => {
            mobileNav.classList.add('active');
        });

        closeMenuBtn.addEventListener('click', () => {
            mobileNav.classList.remove('active');
        });
    </script>
</body>

</html>
