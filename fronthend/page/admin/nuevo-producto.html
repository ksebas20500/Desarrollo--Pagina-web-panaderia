<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Producto - Admin La Fábrica</title>
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body class="dashboard-body">

    <div class="admin-layout">

        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="icon-circle-small">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z">
                        </path>
                        <line x1="6" y1="17" x2="18" y2="17"></line>
                    </svg>
                </div>
                <h3>La Fábrica</h3>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="9"></rect>
                        <rect x="14" y="3" width="7" height="5"></rect>
                        <rect x="14" y="12" width="7" height="9"></rect>
                        <rect x="3" y="16" width="7" height="5"></rect>
                    </svg>
                    Dashboard
                </a>
                <a href="productos.html" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                        </path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    Productos
                </a>
            </nav>

            <a href="login.html" class="logout-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Cerrar Sesión
            </a>
        </aside>

        <main class="main-content">

            <header class="top-header" style="justify-content: flex-start; gap: 15px;">
                <a href="productos.html" class="back-arrow" style="color: #2D241F;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <h1 class="page-title">Nuevo Producto</h1>
            </header>

            <div class="dashboard-panel form-panel">
                <h3 class="form-section-title">Nuevo Producto</h3>

                <form action="#" class="product-form">

                    <div class="form-group">
                        <label>Nombre del producto</label>
                        <input type="text" placeholder="Pan artesanal">
                    </div>

                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea rows="4" placeholder="Describe el producto..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Precio</label>
                            <input type="number" placeholder="10.00">
                        </div>
                        <div class="form-group">
                            <label>Categoría</label>
                            <select>
                                <option value="" disabled selected>Seleccionar categoría</option>
                                <option value="panes">Panes</option>
                                <option value="tortas">Tortas</option>
                                <option value="postres">Postres</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Imagen del producto</label>
                        <div class="image-upload-box">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <p>Subir imagen</p>
                        </div>
                    </div>

                    <div class="toggle-container">
                        <div class="toggle-text">
                            <h4>Producto activo</h4>
                            <p>Los productos activos se muestran en el sitio web</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-muted">Crear producto</button>
                        <button type="button" class="btn-outline">Cancelar</button>
                    </div>

                </form>
            </div>

        </main>
    </div>

</body>

</html>
