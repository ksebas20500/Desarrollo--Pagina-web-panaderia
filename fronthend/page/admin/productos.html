<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Admin La Fábrica</title>
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body class="dashboard-body">

    <div class="admin-layout">

        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="icon-circle-small">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z">
                        </path>
                        <line x1="6" y1="17" x2="18" y2="17"></line>
                    </svg>
                </div>
                <h3>La Fábrica</h3>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="9"></rect>
                        <rect x="14" y="3" width="7" height="5"></rect>
                        <rect x="14" y="12" width="7" height="9"></rect>
                        <rect x="3" y="16" width="7" height="5"></rect>
                    </svg>
                    Dashboard
                </a>
                <a href="productos.html" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                        </path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    Productos
                </a>
            </nav>

            <a href="login.html" class="logout-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Cerrar Sesión
            </a>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">Productos</h1>
                <a href="nuevo-producto.html" class="btn-primary" style="text-decoration: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Nuevo Producto
                </a>
            </header>

            <!-- === PANEL DE LA TABLA === -->
            <!-- En este contenedor se insertarán los productos que se traen de la base de datos a través de JS -->
            <div class="dashboard-panel">
                <h3 class="panel-title">Lista de Productos</h3>

                <div id="empty-products-msg" class="empty-state">
                    <p>No hay productos todavía</p>
                    <a href="nuevo-producto.html" class="btn-primary" style="text-decoration: none;">Agregar primer
                        producto</a>
                </div>

                <div id="products-table-container" style="display: none;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Estado</th>
                                <th class="right-align">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpo-tabla">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL PARA VER DETALLE DEL PRODUCTO -->
    <div id="modal-ver" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModal()" title="Cerrar">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div class="modal-img-container">
                <img id="modal-img" src="" alt="Sin imagen">
            </div>
            <h2 id="modal-title" class="modal-title">Cargando...</h2>
            <p id="modal-desc" class="modal-desc">...</p>
            <div class="modal-flex">
                <span id="modal-category" class="pill-category">...</span>
                <span id="modal-price" class="modal-price">$0.00</span>
            </div>
        </div>
    </div>

    <!-- CARGAR SCRIPT -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBz1hgapvwapYHblYf3W2uvhdOoWVZxFLI",
            authDomain: "desarrolo-panaderia-la-fabrica.firebaseapp.com",
            projectId: "desarrolo-panaderia-la-fabrica",
            storageBucket: "desarrolo-panaderia-la-fabrica.firebasestorage.app",
            messagingSenderId: "444313347033",
            appId: "1:444313347033:web:7102e2a1b079326d442fc8"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
    <script src="../../js/cargar_productos.js?v=2"></script>
</body>

</html>
